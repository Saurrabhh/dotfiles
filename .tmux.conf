# =====================================================================
# 📦 Tmux Configuration
# Linked to: ~/.tmux.conf (macOS and WSL/Linux)
# Core Theme: Tokyo Night with JetBrains Island Dark Overrides
# =====================================================================

# ---------------------------------------------------------------------
# 1. GENERAL & BEHAVIORAL SETTINGS
# ---------------------------------------------------------------------
# Start window indexing at 1 (instead of 0) to align with top-row keyboard keys
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows sequentially when a window is closed
set -g renumber-windows on

# Enable full mouse support (interactively resize panes, click tabs, scroll)
set -g mouse on

# Improve color rendering support and enable 24-bit TrueColor/RGB capabilities
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# ---------------------------------------------------------------------
# 2. KEYBOARD BINDINGS & PANE MANAGEMENT
# ---------------------------------------------------------------------
# Make splitting panes easier and preserve the active path in new splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Swap the active pane with adjacent panes in a direction (Prefix + Shift + Arrow)
bind S-Left swap-pane -t "{left-of}"
bind S-Right swap-pane -t "{right-of}"
bind S-Up swap-pane -t "{up-of}"
bind S-Down swap-pane -t "{down-of}"

# Resize the active pane in a direction by 5 cells (Prefix + Ctrl + Arrow)
bind -r C-Left resize-pane -L 2
bind -r C-Right resize-pane -R 2
bind -r C-Up resize-pane -U 2
bind -r C-Down resize-pane -D 2

# Rename the active pane title (Prefix + r)
bind r command-prompt -p "Rename pane: " "select-pane -T '%%'"

# Join/move pane to the last active pane (Prefix + J for vertical, Prefix + K for horizontal)
# Note: '!' represents the last active window/pane
bind J join-pane -v -t !
bind K join-pane -h -t !

# ---------------------------------------------------------------------
# 3. UI AND AESTHETICS (JetBrains Island Dark Theme)
# ---------------------------------------------------------------------

# Pane borders styling
# Set inactive borders to a dark slate gray and active border to JetBrains Blue
set -g pane-border-style "fg=#2b2d31,bg=default"
set -g pane-active-border-style "fg=#3574f0,bg=default"

# Show pane numbers and custom titles in the pane border at the top of splits
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#3574f0\,bold] #P: #T #[default],#[fg=#808080] #P: #T #[default]}"
set -g display-panes-time 3000 # Keep pane numbers visible for 3 seconds during selection

# Status Bar Configuration
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left

# Set status bar colors to match the JetBrains UI tool window bar (#2b2d31)
set -g status-style "fg=#808080,bg=#2b2d31"

# Left Status: Show active session name inside a solid JetBrains Blue box
set -g status-left-length 30
set -g status-left "#[fg=#dfe1e5,bg=#3574f0,bold] #S #[default] "

# Right Status: Show minimal system date and time separated by a dark dot
set -g status-right-length 50
set -g status-right "#[fg=#808080]%Y-%m-%d #[fg=#1e1f22]• #[fg=#3574f0,bold]%H:%M #[default]"

# Window Tab / Listing Styling
# Inactive tabs: blend into the status bar background
set -g window-status-format "#[fg=#808080,bg=#2b2d31] #I:#W "
# Active tab: styled with a solid background matching WezTerm editor canvas (#1e1f22)
set -g window-status-current-format "#[fg=#dfe1e5,bg=#1e1f22,bold] #I:#W* #[default]"
