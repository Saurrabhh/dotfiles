# Start window indexing at 1 (instead of 0) for easier keyboard navigation
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support (helpful for clicking tabs and resizing panes)
set -g mouse on

# Improve color support and enable true colors
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Make splitting panes easier (using | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Swap the current pane with adjacent panes in a direction (Prefix + Shift + Arrow)
bind S-Left swap-pane -t "{left}"
bind S-Right swap-pane -t "{right}"
bind S-Up swap-pane -t "{up}"
bind S-Down swap-pane -t "{down}"

# Show pane numbers in the pane border at the top
set -g pane-border-status top
set -g pane-border-format " [Pane #P] "
set -g display-panes-time 3000 # Show pane numbers for 3 seconds during selection
