# Start window indexing at 1 (instead of 0) for easier keyboard navigation
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support (helpful for clicking tabs and resizing panes)
set -g mouse on

# Improve color support and enable true colors
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Make splitting panes easier (using | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Swap the current pane with adjacent panes in a direction (Prefix + Shift + Arrow)
bind S-Left swap-pane -t "{left-of}"
bind S-Right swap-pane -t "{right-of}"
bind S-Up swap-pane -t "{up-of}"
bind S-Down swap-pane -t "{down-of}"

# --- Tokyo Night Storm Theme Styling ---

# Pane borders
set -g pane-border-style "fg=#292e42,bg=default"
set -g pane-active-border-style "fg=#7aa2f7,bg=default"

# Show pane numbers and titles in the pane border at the top
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#7aa2f7\,bold] #P: #T #[default],#[fg=#565f89] #P: #T #[default]}"
set -g display-panes-time 3000 # Show pane numbers for 3 seconds during selection

# Status bar setup
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#565f89,bg=#1a1b26"

# Left side shows session name in a beautiful light-blue box
set -g status-left-length 30
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[default] "

# Right side shows minimal time and date
set -g status-right-length 50
set -g status-right "#[fg=#565f89]%Y-%m-%d #[fg=#292e42]• #[fg=#7aa2f7,bold]%H:%M #[default]"

# Window tabs styling
set -g window-status-format "#[fg=#565f89,bg=#1a1b26] #I:#W "
set -g window-status-current-format "#[fg=#73daca,bg=#292e42,bold] #I:#W* #[default]"

# Rename active pane (Prefix + r)
bind r command-prompt -p "Rename pane: " "select-pane -T '%%'"

# Join/move pane to the last active pane (Prefix + J for vertical, Prefix + K for horizontal)
bind J join-pane -v -t !
bind K join-pane -h -t !


